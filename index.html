<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Delight - Order Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-coffee"></i> Cafe Moonlight</h1>
            <p>Manage your orders with ease</p>
        </header>

        <div class="order-form">
            <h2>Place Your Order</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="customerName">Your Name:</label>
                    <input type="text" id="customerName" required>
                </div>
                
                <div class="form-group">
                    <label>Select Items:</label>
                    <div class="item-cards" id="itemCards">
                        <!-- Item cards will be dynamically inserted here -->
                    </div>
                </div>

                <div class="selected-items-list" id="selectedItemsList">
                    <h3>Your Selected Items</h3>
                    <div id="selectedItemsContainer">
                        <!-- Selected items will appear here -->
                    </div>
                    <div class="order-total">
                        <strong>Total: </strong><span id="orderTotal">₹0</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="specialInstructions">Special Instructions:</label>
                    <textarea id="specialInstructions" rows="2"></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Place Order</button>
                <button type="button" id="updateBtn" style="display:none;">Update Order</button>
                <button type="button" id="cancelBtn" style="display:none;">Cancel</button>
                
                <input type="hidden" id="orderId">
            </form>
        </div>

        <div class="order-list">
            <h2>Your Orders</h2>
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="Search by name or item...">
                <select id="filterStatus">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="preparing">Preparing</option>
                    <option value="ready">Ready</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div id="ordersContainer">
                <!-- Orders will be displayed here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
